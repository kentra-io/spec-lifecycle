name: Release

# Cut a release by pushing a semver tag:  git tag v0.1.0 && git push origin v0.1.0
# CI then runs GoReleaser (.goreleaser.yaml): builds every target, publishes a
# GitHub Release with archives + checksums, and pushes the Homebrew cask to
# kentra-io/homebrew-tap. See docs/releasing.md.
#
# Actions here are pinned to full commit SHAs (tag in trailing comment) because
# this workflow holds a cross-repo token (HOMEBREW_TAP_TOKEN); a mutated tag on
# a third-party action must not be able to exfiltrate it. ci.yml stays tag-pinned
# (no secrets beyond the default token).
on:
  push:
    tags:
      - "v[0-9]*"

# GoReleaser needs write access to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # GoReleaser's changelog + git-state checks need full history and tags.
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.x"
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Default token: creates the Release and uploads assets to THIS repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token for pushing the cask to kentra-io/homebrew-tap. The
          # default GITHUB_TOKEN cannot write to another repo. This is the same
          # org-level secret the constitution repo uses (promoted from a
          # per-repo PAT — implementation-plan.md §10.4 — so every primitive
          # repo shares one token instead of duplicating it). Absent it, the
          # build succeeds but the cask push step fails.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Post-v1: attest build provenance for the release artifacts (supply-chain
      # SLSA provenance). Deferred, mirroring the constitution's posture. To
      # enable, uncomment this step AND add `id-token: write` + `attestations:
      # write` to the job `permissions` above.
      # - uses: actions/attest-build-provenance@v4
      #   with:
      #     subject-path: "dist/*.tar.gz,dist/*.zip,dist/checksums.txt"
