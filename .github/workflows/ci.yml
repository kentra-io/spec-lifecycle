name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.26.x"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go vet ./...
      # -race only on the ubuntu/1.26 leg: the data-race detector needs cgo +
      # a C toolchain, is slowest there, and one representative leg is enough
      # coverage for our (mostly pure, filesystem-serial) code. The other legs
      # run the same tests without it.
      - name: test
        shell: bash
        run: |
          flags=""
          if [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.go }}" = "1.26.x" ]; then
            flags="-race"
          fi
          go test $flags ./... -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Lint tracks the newest toolchain only; the test matrix owns 1.25-floor compatibility.
          go-version: "1.26.x"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
